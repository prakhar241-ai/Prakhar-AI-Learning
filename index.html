<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My first Page</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-image: url('mahatma_gandhi.PNG');
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }

    .name {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
      margin-top: 1rem;
      letter-spacing: 2px;
    }

    .wiki-link {
      position: fixed;
      top: 16px;
      right: 20px;
      color: #ffffff;
      background-color: rgba(0,0,0,0.55);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 6px;
      border: 2px solid #ffffff;
      letter-spacing: 1px;
      transition: background-color 0.2s;
    }

    .wiki-link:hover {
      background-color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <a class="wiki-link" href="https://www.wikipedia.org" target="_blank">Wikipedia</a>
  <h1>My first Page</h1>
  <h2>yeeeee</h2>
  <p class="name">Prakhar</p>
</body>
</html>
