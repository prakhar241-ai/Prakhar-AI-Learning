<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My first Page</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #ADD8E6;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #555;
    }

    hr {
      width: 60%;
      border: none;
      height: 4px;
      background-color: #FFD700;
      margin: 1rem 0;
      display: block;
    }

    .beam {
      position: fixed;
      top: 50%;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, transparent, #FFD700, #FFA500, #FFD700, transparent);
      transform: translateY(-50%);
      box-shadow: 0 0 18px 4px rgba(255, 200, 0, 0.6);
    }

    .vertical-line {
      position: fixed;
      top: 0;
      left: 50%;
      width: 6px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #FF0000, #CC0000, #FF0000, transparent);
      transform: translateX(-50%);
      box-shadow: 0 0 18px 4px rgba(255, 0, 0, 0.5);
    }

    .name {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      margin-top: 1rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="beam"></div>
  <div class="vertical-line"></div>
  <h1>My first Page</h1>
  <hr>
  <h2>yeeeee</h2>
  <p class="name">Prakhar</p>
</body>
</html>
