<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My first Page</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-image: url('mahatma_gandhi.PNG');
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }

    hr {
      width: 60%;
      border: none;
      height: 4px;
      background-color: #FFD700;
      margin: 1rem 0;
      display: block;
    }

    .beam {
      position: fixed;
      top: 50%;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, transparent, #FFD700, #FFA500, #FFD700, transparent);
      transform: translateY(-50%);
      box-shadow: 0 0 18px 4px rgba(255, 200, 0, 0.6);
    }


    .name {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
      margin-top: 1rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="beam"></div>
  <h1>My first Page</h1>
  <hr>
  <h2>yeeeee</h2>
  <p class="name">Prakhar</p>
</body>
</html>
